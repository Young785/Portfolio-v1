# giant.bizinvestify.com - Ariyo Ayomikun Portfolio
server {
    listen 80;
    server_name giant.bizinvestify.com;

    root /var/www/giant.bizinvestify.com;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    access_log /var/log/nginx/giant.bizinvestify.com.access.log;
    error_log /var/log/nginx/giant.bizinvestify.com.error.log;
}
